<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cobuddy OS Boot</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet" />
  <style>
    body{
      margin:0;
      background:black;
      color:#00ff88;
      font-family:'Orbitron',sans-serif;
      overflow:hidden;
    }

    .boot{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
      background:black;
      z-index:2;
    }

    .boot-lines{
      width:80%;
      max-width:700px;
      font-size:18px;
      line-height:32px;
    }

    .boot-lines span{
      display:block;
      opacity:0;
    }

    .controls{
      margin-top:30px;
    }

    .play-btn{
      display:none;
      background:#00ff88;
      color:black;
      border:none;
      padding:14px 28px;
      border-radius:8px;
      font-family:'Orbitron',sans-serif;
      font-size:16px;
      font-weight:700;
      letter-spacing:2px;
      cursor:pointer;
      box-shadow:0 0 18px rgba(0,255,136,.35);
    }

    .boot-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      background:black;
      display:none;
      z-index:1;
    }
  </style>
</head>
<body>

  <div class="boot" id="bootScreen">
    <div class="boot-lines">
      <span id="b1">INITIALIZING COBUDDY OS...</span>
      <span id="b2">Loading Atlas Module...</span>
      <span id="b3">Loading Axis Runtime...</span>
      <span id="b4">Connecting Libra Engine...</span>
      <span id="b5">Starting Nexus Control...</span>
      <span id="b6">Neo Intelligence Online...</span>
      <span id="b7">SYSTEM READY</span>
    </div>

    <div class="controls">
      <button id="playBtn" class="play-btn">PLAY</button>
    </div>
  </div>

  <video id="bootVideo" class="boot-video" playsinline preload="auto">
    <source src="Boot-logo-intro.MP4" type="video/mp4">
  </video>

  <script>
    const lines = ["b1","b2","b3","b4","b5","b6","b7"];
    const playBtn = document.getElementById("playBtn");
    const bootVideo = document.getElementById("bootVideo");
    const bootScreen = document.getElementById("bootScreen");
    let started = false;

    lines.forEach((id, i) => {
      setTimeout(() => {
        document.getElementById(id).style.opacity = 1;
      }, i * 700);
    });

    setTimeout(() => {
      playBtn.style.display = "inline-block";
    }, lines.length * 700 + 400);

    playBtn.addEventListener("click", () => {
      if (started) return;
      started = true;
      bootScreen.style.display = "none";
      bootVideo.style.display = "block";
      bootVideo.play();
    });

    bootVideo.addEventListener("ended", () => {
      window.location.href = "orbitsway.html";
    });
  </script>

</body>
</html>
